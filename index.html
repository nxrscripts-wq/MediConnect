<!doctype html>
<html lang="pt-AO">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Título da aba do browser -->
    <title>MediConnect — Sistema Nacional de Saúde</title>

    <!-- Favicon PNG (principal) -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Favicon SVG (fallback/modern) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Apple Touch Icon (iOS) -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Meta description -->
    <meta name="description" content="MediConnect — Sistema de Gestão de Saúde Pública. República de Angola." />

    <!-- Impedir indexação por motores de busca -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- Open Graph -->
    <meta property="og:title" content="MediConnect" />
    <meta property="og:description" content="Sistema Nacional de Gestão de Saúde — Angola" />
    <meta property="og:type" content="website" />

    <!-- Cor da barra do browser em mobile -->
    <meta name="theme-color" content="#0e7490" />

    <!-- Desactivar detecção automática de telefones -->
    <meta name="format-detection" content="telephone=no" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
